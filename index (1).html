<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutero Inteligente 3.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #111827;
            --card-bg: rgba(31, 41, 55, 0.7);
            --text-color: #f3f4f6;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 450px 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            font-size: 1.6rem;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .loading-input {
            border-color: #eab308 !important;
            background: rgba(234, 179, 8, 0.1) !important;
            color: #fef08a !important;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #111827;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }
        .btn-secondary:hover {
            background-color: rgba(56, 189, 248, 0.1);
        }

        .location-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .location-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .location-list {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
        }

        .route-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .route-item-info {
            display: flex;
            flex-direction: column;
        }

        .badge {
            background: var(--accent-color);
            color: #111827;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .counter {
            text-align: right;
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 5px;
        }

        #map-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            min-height: 400px;
            height: 90vh;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>📍 Optimizador de Ruta Real</h1>

        <div class="section">
            <label for="origin-name">1. Nombre del Origen:</label>
            <input type="text" id="origin-name" value="Mi Ubicación Actual" style="margin-bottom: 8px;">
            <label for="origin">URL de GPS Origen:</label>
            <input type="text" id="origin" placeholder="Ubicación automática o pega enlace...">
        </div>

        <div class="section">
            <label>2. Destinos (Máximo 30):</label>
            <div id="destinations-container">
                <div class="location-card">
                    <div class="location-input-group">
                        <input type="text" class="dest-name" placeholder="Nombre del sitio (Ej: Cliente Juan, Depósito...)">
                        <input type="text" class="dest-input" placeholder="Pegar enlace de GPS (Google, Waze, etc)...">
                    </div>
                </div>
            </div>
            <div class="counter"><span id="count">1</span>/30 Ubicaciones</div>
            
            <button type="button" class="btn-secondary" id="add-btn">+ Agregar Ubicación</button>
        </div>

        <button id="calc-btn">Calcular Ruta en Mapa</button>

        <div class="location-list" id="result-section" style="display: none;">
            <h3>📋 Orden de Ruta Optimizado:</h3>
            <div id="route-output"></div>
        </div>
    </div>

    <div id="map-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map-container').setView([10.644, -71.644], 13); 

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    let mapLayers = []; 
    const container = document.getElementById('destinations-container');
    const addBtn = document.getElementById('add-btn');
    const calcBtn = document.getElementById('calc-btn');
    const countSpan = document.getElementById('count');
    const resultSection = document.getElementById('result-section');
    const routeOutput = document.getElementById('route-output');
    const originInput = document.getElementById('origin');
    const originNameInput = document.getElementById('origin-name');

    let totalInputs = 1;

    window.addEventListener('DOMContentLoaded', () => {
        setupInputListeners(originInput);
        setupInputListeners(document.querySelector('.dest-input'));

        if (navigator.geolocation) {
            originInput.placeholder = "📍 Solicitando permiso de ubicación...";
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    originInput.value = `${lat}, ${lng}`;
                    map.setView([lat, lng], 14);
                    L.popup()
                        .setLatLng([lat, lng])
                        .setContent(`📍 ${originNameInput.value} (Establecido)`)
                        .openOn(map);
                },
                (error) => {
                    console.warn("Geolocalización denegada:", error);
                    originInput.placeholder = "Pega cualquier enlace de GPS aquí...";
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    });

    addBtn.addEventListener('click', () => {
        if (totalInputs < 30) {
            totalInputs++;
            const card = document.createElement('div');
            card.className = 'location-card';
            card.innerHTML = `
                <div class="location-input-group">
                    <input type="text" class="dest-name" placeholder="Nombre del sitio (Ej: Cliente ${totalInputs})...">
                    <input type="text" class="dest-input" placeholder="Pegar enlace de GPS (Google, Waze, etc)...">
                </div>
            `;
            container.appendChild(card);
            countSpan.textContent = totalInputs;
            
            setupInputListeners(card.querySelector('.dest-input'));
        }
    });

    function isShortUrl(url) {
        if (!url) return false;
        const lower = url.toLowerCase();
        return lower.includes("goo.gl") || lower.includes("maps.app") || lower.includes("maps.google") || lower.includes("googleusercontent.com");
    }

     function extractCoords(url) {
     if (!url) return null;
     url = url.trim();
    
     // 1. Patrón para enlaces tipo @lat,lng,z
     const regexAt = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
     const matchAt = url.match(regexAt);
     if (matchAt) return { lat: parseFloat(matchAt[1]), lng: parseFloat(matchAt[2]) };

     // 2. Patrón para parámetros ?q=lat,lng
     const qMatch = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
     if (qMatch) return { lat: parseFloat(qMatch[1]), lng: parseFloat(qMatch[2]) };

     // 3. Patrón para coordenadas directas (lat, lng)
     const regexSimple = /(-?\d+\.\d+),\s*(-?\d+\.\d+)/;
     const matchSimple = url.match(regexSimple);
     if (matchSimple) return { lat: parseFloat(matchSimple[1]), lng: parseFloat(matchSimple[2]) };

     return null;
    }
    
    async function getCoordsFromName(query) {
    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
    const data = await response.json();
    if (data && data.length > 0) {
        return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    }
    return null;
}

    // FUNCIÓN DE AUTO-RESOLUCIÓN EN TRASFONDO AL PEGAR EL ENLACE
    function setupInputListeners(inputElement) {
        const handleInputChange = async () => {
            let val = inputElement.value.trim();
            if (isShortUrl(val)) {
                inputElement.classList.add('loading-input');
                inputElement.value = "🔄 Resolviendo coordenadas automáticamente...";
                
                let coords = await resolveShortUrlParallel(val);
                
                inputElement.classList.remove('loading-input');
                if (coords) {
                    inputElement.value = `${coords.lat}, ${coords.lng}`;
                } else {
                    inputElement.value = val; // Mantiene el link original como respaldo si falla la red
                }
            }
        };

        inputElement.addEventListener('paste', () => setTimeout(handleInputChange, 100));
        inputElement.addEventListener('change', handleInputChange);
    }

    // Sistema de redundancia paralela (usa múltiples métodos alternativos por si uno falla)
    async function resolveShortUrlParallel(shortUrl) {
        return new Promise(async (resolve) => {
            let resolved = false;
            const done = (res) => {
                if (!resolved) {
                    resolved = true;
                    resolve(res);
                }
            };

            // Intento 1: Proxy CORS Shandon
            fetch(`https://corsproxy.io/?${encodeURIComponent(shortUrl)}`)
                .then(res => res.text())
                .then(html => {
                    let c = parseHtmlForCoords(html);
                    if (c) done(c);
                }).catch(() => {});

            // Intento 2: JSONP AllOrigins de Respaldo directo rápido
            const callbackName = 'jsonp_cb_' + Math.floor(Math.random() * 100000);
            const script = document.createElement('script');
            window[callbackName] = function(data) {
                if (data && data.contents) {
                    let c = parseHtmlForCoords(data.contents);
                    if (c) done(c);
                }
                document.body.removeChild(script);
            };
            script.src = `https://api.allorigins.win/get?url=${encodeURIComponent(shortUrl)}&callback=${callbackName}`;
            document.body.appendChild(script);

            // Timeout absoluto de 4.5 segundos
            setTimeout(() => done(null), 4500);
        });
    }

    function parseHtmlForCoords(htmlContent) {
        const patterns = [
            /window\.APP_INITIALIZATION_STATE=\[\[\[.*?(-?\d+\.\d+).*?(-?\d+\.\d+)/,
            /(\d+\.\d+),\s*(-?\d+\.\d+)/,
            /ll=(-?\d+\.\d+),(-?\d+\.\d+)/,
            /place\/(-?\d+\.\d+),(-?\d+\.\d+)/
        ];
        for (let pattern of patterns) {
            const match = htmlContent.match(pattern);
            if (match && Math.abs(parseFloat(match[1])) <= 90 && Math.abs(parseFloat(match[2])) <= 180) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
        }
        return null;
    }

    function clearMap() {
        mapLayers.forEach(layer => map.removeLayer(layer));
        mapLayers = [];
    }

    async function getRoadDistance(origin, dest) {
        const url = `https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${dest.lng},${dest.lat}?overview=false`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.routes && data.routes.length > 0) return data.routes[0].distance / 1000; 
        } catch (e) { console.error(e); }
        return Infinity; 
    }

    async function drawFullRoute(orderedPoints) {
        const coordsString = orderedPoints.map(p => `${p.lng},${p.lat}`).join(';');
        const url = `https://router.project-osrm.org/route/v1/driving/${coordsString}?overview=full&geometries=geojson`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.routes && data.routes.length > 0) {
                const geometry = data.routes[0].geometry;
                const polylinePoints = geometry.coordinates.map(coord => [coord[1], coord[0]]);
                const polyline = L.polyline(polylinePoints, {color: '#38bdf8', weight: 5, opacity: 0.8}).addTo(map);
                mapLayers.push(polyline);
                map.fitBounds(polyline.getBounds(), { padding: [50, 50] });
            }
        } catch (e) { console.error(e); }
    }

    calcBtn.addEventListener('click', async () => {
        let originUrl = originInput.value.trim();
        let originCoords = extractCoords(originUrl);

        if (!originCoords) {
            alert('Asegúrate de que el origen contenga coordenadas válidas (Lat, Lng).');
            return;
        }

        const cards = document.querySelectorAll('.location-card');
        let destinations = [];

        cards.forEach((card, index) => {
            const nameInput = card.querySelector('.dest-name');
            let urlInput = card.querySelector('.dest-input').value.trim();
            const name = nameInput.value.trim() || `Destino ${index + 1}`;
            
            if (urlInput !== "") {
                let coords = extractCoords(urlInput);
                if (coords) {
                    destinations.push({ name: name, lat: coords.lat, lng: coords.lng });
                }
            }
        });

        if (destinations.length === 0) {
            alert('Por favor, ingresa al menos un destino con coordenadas válidas.');
            return;
        }

        calcBtn.innerText = "Optimizando trayectorias...";
        calcBtn.disabled = true;
        clearMap();

        let destinationsWithDistance = [];
        for (let dest of destinations) {
            const roadDist = await getRoadDistance(originCoords, dest);
            destinationsWithDistance.push({ ...dest, distance: roadDist });
        }

        destinationsWithDistance.sort((a, b) => a.distance - b.distance);
        const fullRoutePoints = [originCoords, ...destinationsWithDistance];

        const originMarker = L.circleMarker([originCoords.lat, originCoords.lng], {
            radius: 10, fillColor: '#10b981', color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9
        }).addTo(map).bindPopup(`<b>Inicio: ${originNameInput.value}</b>`);
        mapLayers.push(originMarker);

        destinationsWithDistance.forEach((dest, idx) => {
            const marker = L.circleMarker([dest.lat, dest.lng], {
                radius: 8, fillColor: '#38bdf8', color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9
            }).addTo(map).bindPopup(`<b>Parada ${idx + 1}: ${dest.name}</b><br>Distancia: ${dest.distance.toFixed(2)} km`);
            mapLayers.push(marker);
        });

        await drawFullRoute(fullRoutePoints);

        routeOutput.innerHTML = "";
        destinationsWithDistance.forEach((dest, idx) => {
            const item = document.createElement('div');
            item.className = 'route-item';
            item.innerHTML = `
                <div class="route-item-info">
                    <strong>Parada ${idx + 1}: ${dest.name}</strong>
                    <span style="font-size:0.75rem; color:#9ca3af;">Lat: ${dest.lat.toFixed(4)}, Lng: ${dest.lng.toFixed(4)}</span>
                </div>
                <span class="badge">${dest.distance.toFixed(2)} km</span>
            `;
            routeOutput.appendChild(item);
        });

        resultSection.style.display = 'block';
        calcBtn.innerText = "Calcular Ruta en Mapa";
        calcBtn.disabled = false;
    });
</script>

</body>
</html>
